<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0b79ac;
            --success-color: #28a745;
            --bg-gradient: linear-gradient(135deg, #4da9b0 0%, #297a9b 100%);
            --text-color: #555;
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
        }

        .success-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .success-card {
            background: #ffffff;
            padding: 60px 40px 40px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            text-align: center;
            position: relative;
        }

        .check-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            color: white;
            font-size: 32px;
        }

        .title {
            font-size: 28px;
            color: var(--success-color);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message {
            font-size: 16px;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: background 0.3s ease;
        }

        .btn-back:hover {
            background: #096894;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>

<body class="auth-bg" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <!-- Theme Toggle (floating) -->
    <button class="theme-toggle-btn" aria-label="Toggle theme" style="position:fixed;top:20px;right:20px;z-index:9999;">
        <i class="material-icons" style="font-size:20px;">dark_mode</i>
    </button>

    <div class="success-container">
        <div class="success-card">
            <div class="check-icon">
                <i class="fas fa-check"></i>
            </div>

            <h1 class="title">Request Submitted</h1>
            <p class="message">
                If an account with <strong>{{ email }}</strong> exists,
                we will send a password reset link shortly.
            </p>

            <a href="/" class="btn-back">Back to Login</a>
        </div>
    </div>

</body>

</html>
