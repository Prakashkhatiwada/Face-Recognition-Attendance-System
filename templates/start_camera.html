<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Take Attendance (Camera)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-navbar mb-5 position-sticky top-0 sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="material-icons me-2 text-primary" style="font-size: 32px;">face</i>
                FaceAttend
            </a>
            <div class="d-flex align-items-center mb-0">
                <button class="theme-toggle-btn me-2" aria-label="Toggle theme">
                    <i class="material-icons" style="font-size:20px;">dark_mode</i>
                </button>
                <a href="/" class="btn btn-outline-secondary btn-sm me-2 rounded-pill px-3">Home</a>
                <a href="/admin_login" class="btn gradient-btn btn-sm px-4 rounded-pill">Admin Login</a>
            </div>
        </div>
    </nav>
  <div class="container context-container mb-5">
    <div class="modern-card p-5 text-center mx-auto" style="max-width: 800px;">
        <h2 class="mb-4 text-gradient fw-bold"><i class="material-icons align-middle fs-1 me-2">camera_front</i> Live Attendance Scanner</h2>
        <p class="text-muted mb-4">Position your face clearly within the frame for automatic recognition.</p>

        <div class="d-flex justify-content-center mb-4">
            <div class="p-2 bg-white rounded-4 shadow-sm border" style="display: inline-block;">
                <video id="video" width="640" height="480" autoplay muted playsinline class="rounded-3" style="background-color: #000; transform: scaleX(-1);"></video>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
            <button id="captureBtn" class="btn gradient-btn px-4 py-2"><i class="material-icons align-middle me-2">center_focus_weak</i> Single Capture</button>
            <button id="startLoopBtn" class="btn btn-outline-primary rounded-pill px-4 py-2 bg-white"><i class="material-icons align-middle me-2">autorenew</i> Start Auto-Scan</button>
            <button id="stopLoopBtn" class="btn btn-outline-danger rounded-pill px-4 py-2 bg-white" disabled><i class="material-icons align-middle me-2">stop_circle</i> Stop Scan</button>
        </div>

        <div class="text-center mb-3 min-vh-25">
            <div id="status" class="fw-bold text-primary fs-5 mb-2" style="min-height: 30px;"></div>
            <div id="result" class="text-center rounded-3 overflow-hidden"></div>
        </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='camera.js') }}"></script>
  <script>
    const videoEl = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const startLoopBtn = document.getElementById('startLoopBtn');
    const stopLoopBtn = document.getElementById('stopLoopBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    // Start camera
    setupCamera(videoEl).catch(err => {
      statusEl.textContent = "Camera error: " + err.message;
    });

    captureBtn.addEventListener('click', async () => {
      statusEl.textContent = "Uploading...";
      try {
        const res = await uploadCaptureAsForm(videoEl, "{{ url_for('attendance.recognize') }}");
        statusEl.textContent = "";
        if (res.success) {
          resultEl.innerHTML = `<div class="alert alert-success">Recognized: <strong>${res.label || 'Unknown'}</strong> — logged: ${res.logged}</div>`;
          if (res.logged) {
            setTimeout(() => window.location.href = "{{ url_for('attendance.home') }}", 900);
          }
        } else {
          resultEl.innerHTML = `<div class="alert alert-warning">${res.message || 'No face detected'}</div>`;
        }
      } catch (err) {
        statusEl.textContent = "";
        resultEl.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    });

    // Continuous loop
    let loopHandle = null;
    startLoopBtn.addEventListener('click', () => {
      startLoopBtn.disabled = true;
      stopLoopBtn.disabled = false;
      statusEl.textContent = "Continuous recognition running...";
      loopHandle = setInterval(async () => {
        try {
          const res = await uploadCaptureAsForm(videoEl, "{{ url_for('attendance.recognize') }}");
          if (res.success && res.logged) {
            resultEl.innerHTML = `<div class="alert alert-success">Recognized: <strong>${res.label}</strong> — logged: ${res.logged}</div>`;
            clearInterval(loopHandle);
            startLoopBtn.disabled = false;
            stopLoopBtn.disabled = true;
            setTimeout(() => window.location.href = "{{ url_for('attendance.home') }}", 800);
          }
        } catch (err) {
          console.error("Loop error", err);
        }
      }, 1200);
    });

    stopLoopBtn.addEventListener('click', () => {
      if (loopHandle) clearInterval(loopHandle);
      loopHandle = null;
      startLoopBtn.disabled = false;
      stopLoopBtn.disabled = true;
      statusEl.textContent = "Stopped.";
    });
  </script>
</body>

</html>
