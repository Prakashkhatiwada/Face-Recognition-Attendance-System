<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture User Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <style>
        .capture-container {
            max-width: 800px;
            margin: 50px auto;
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 20px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            background-color: #000;
        }

        #videoElement {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        .status-badge {
            font-size: 1rem;
            padding: 10px 20px;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .flashing {
            animation: flash 0.5s;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container context-container">
        <div class="capture-container modern-card text-center p-5">
            <h2 class="mb-3 text-gradient fw-bold"><i class="material-icons align-middle fs-1">center_focus_strong</i> Capture Face Data</h2>
            <p class="text-muted fs-5">Enrolling System User: <strong class="text-dark">{{ username }}</strong> <span class="badge bg-primary ms-2 rounded-pill">ID: {{ userid }}</span></p>

            <div id="video-container" class="mt-4 mb-4">
                <video id="videoElement" autoplay playsinline></video>
                <div class="position-absolute top-0 start-0 w-100 h-100 pointer-events-none d-flex justify-content-center align-items-center" style="pointer-events: none;">
                    <i class="material-icons text-white opacity-25" style="font-size: 200px;">face</i>
                </div>
            </div>

            <div class="row g-3 justify-content-center mt-4">
                <div class="col-md-5">
                    <button id="btnCapture" class="btn gradient-btn w-100 py-3 fs-5 shadow-sm">
                        <i class="material-icons align-middle me-2">camera</i> Capture Frame
                    </button>
                </div>
                <div class="col-md-5">
                    <form action="/admin/end_capture" method="POST">
                        <button type="submit" class="btn btn-outline-success w-100 py-3 fs-5 rounded-pill shadow-sm bg-white">
                            <i class="material-icons align-middle me-2">done_all</i> Finish Enrollment
                        </button>
                    </form>
                </div>
            </div>

            <div class="mt-5">
                <span class="badge bg-dark px-4 py-2 fs-6 rounded-pill shadow-sm" id="countBadge"><i class="material-icons align-middle fs-5 me-2">collections</i> Images Captured: 0 / 50</span>
            </div>
            <div id="messageArea" class="mt-3 fs-5"></div>
        </div>
    </div>

    <!-- Hidden canvas for capturing frames -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const btnCapture = document.getElementById('btnCapture');
        const countBadge = document.getElementById('countBadge');
        const messageArea = document.getElementById('messageArea');
        let captureCount = 0;

        // 1. Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing webcam: ", err);
                messageArea.innerHTML = `<div class="alert alert-danger">Error accessing webcam. Please allow permissions.</div>`;
            }
        }
        startCamera();

        // 2. Capture Image
        btnCapture.addEventListener('click', () => {
            if (!video.srcObject) return;

            // Visual feedback
            video.classList.add('flashing');
            setTimeout(() => video.classList.remove('flashing'), 500);

            // Draw video frame to canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert to Blob and upload
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'capture.jpg');

                fetch('/admin/capture_with_upload', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            captureCount++;
                            countBadge.textContent = `Images Captured: ${captureCount}`;
                            messageArea.innerHTML = `<span class="text-success fw-bold"><i class="material-icons align-middle fs-6">check</i> Saved!</span>`;
                        } else {
                            messageArea.innerHTML = `<span class="text-danger fw-bold"><i class="material-icons align-middle fs-6">error</i> ${data.message}</span>`;
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        messageArea.innerHTML = `<span class="text-danger">Network Error</span>`;
                    });
            }, 'image/jpeg', 0.95);
        });
    </script>

</body>

</html>
